<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini URL</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="container">
    <header class="header">
        <div class="logo">🔗 Mini URL</div>
        <nav class="nav">
            <a href="/">Главная</a>
            <a href="/register">Регистрация</a>
            <a href="/login">Вход</a>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h1>Сократите ваши ссылки</h1>
            <p>Быстрое и удобное создание коротких ссылок</p>
        </section>
        <section class="shorten-section">
            <div class="card">
                <h2>Создать короткую ссылку</h2>
                <form id="shorten-form">
                    <div class="form-group">
                        <input type="url" id="original-url" class="form-control" placeholder="Введите длинный URL..." required>
                    </div>
                    <button type="submit" class="btn btn-primary">Сократить</button>
                </form>
                <div id="result" class="result hidden">
                    <p>Ваша короткая ссылка:</p>
                    <div class="short-url-container">
                        <span id="short-url" class="short-url"></span>
                        <button id="copy-btn" class="btn btn-secondary">Копировать</button>
                    </div>
                </div>
                <p class="info-text">Для создания ссылок требуется <a href="/register">регистрация</a></p>
            </div>
        </section>
    </main>
    <footer class="footer">
        <p>&copy; 2026 Mini URL</p>
    </footer>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
